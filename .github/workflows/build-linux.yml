name: Linux AppImage Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.4.0'
        modules: 'qt5compat qtmultimedia'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake fuse libgl1-mesa-dev xorg-dev qt6-base-dev imagemagick

    - name: Build Project
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)

    - name: Ensure target properties
      run: |
        # In case windployqt was used, qt_add_executable WIN32 is ignored in Linux, but just making sure it builds.
        ls -la build/

    - name: Setup linuxdeploy
      run: |
        wget -c -nv "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
        wget -c -nv "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
        chmod a+x linuxdeploy*.AppImage

    - name: Create AppDir
      run: |
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/share/applications
        mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
        
        # Copy compiled binary
        cp build/AgenciaMedApp AppDir/usr/bin/AgenciaMedApp
        
        # Create a simple .desktop file
        cat <<EOF > AppDir/usr/share/applications/agenciamed.desktop
        [Desktop Entry]
        Name=AgenciaMed
        Exec=AgenciaMedApp
        Icon=agenciamed
        Type=Application
        Categories=Utility;
        EOF
        
        # Create a valid icon because linuxdeployqt crashes on 0-byte icons
        convert -size 256x256 xc:transparent AppDir/usr/share/icons/hicolor/256x256/apps/agenciamed.png

    - name: Deploy Qt libraries and Create AppImage
      run: |
        export PATH="${{ env.Qt6_DIR }}/bin:$PATH"
        export QMAKE="${{ env.Qt6_DIR }}/bin/qmake"
        export EXTRA_QT_PLUGINS="qml,quick,sql"
        export QML_SOURCES_PATHS="qml"
        export QML_MODULES_PATHS="${{ env.Qt6_DIR }}/qml"
        ./linuxdeploy-x86_64.AppImage --appdir=AppDir -d AppDir/usr/share/applications/agenciamed.desktop --plugin qt --output appimage

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AgenciaMed-Linux-AppImage
        path: '*AppImage'
